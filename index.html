<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#F5F5F7">
<title>Bases Concurso Avanzadas 2026 | LarrainVial × Consorcio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg:          #F5F5F7;
    --card:        #FFFFFF;
    --text:        #1D1D1F;
    --text-soft:   #6E6E73;
    --sep:         #E5E5E7;
    --blue:        #0A4FAF;
    --blue-soft:   rgba(10, 79, 175, 0.08);
    --blue-soft-2: rgba(10, 79, 175, 0.14);
    --radius-lg:   24px;
    --radius-md:   20px;
    --radius-sm:   14px;
    --shadow-xs:   0 1px 2px rgba(0,0,0,0.04);
    --shadow-sm:   0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    --shadow-md:   0 8px 30px rgba(0,0,0,0.06);
    --ease:        cubic-bezier(0.4, 0.0, 0.2, 1);
  }

  html, body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
    letter-spacing: -0.01em;
  }

  body { height: 100vh; overflow: hidden; }
  @supports (height: 100dvh) { body { height: 100dvh; } }

  /* ═══ APP SHELL ═══ */
  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ═══ TOP BAR ═══ */
  .topbar {
    background: rgba(245, 245, 247, 0.8);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--sep);
    padding: 16px 24px;
    flex-shrink: 0;
    z-index: 60;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .topbar-brand {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
    margin: 0 auto;
  }
  .topbar-brand .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-soft);
    display: inline-block;
  }
  .topbar-brand .sec { color: var(--text-soft); font-weight: 500; }

  /* Botón menú (móvil) */
  .menu-toggle {
    display: none;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--sep);
    border-radius: 980px;
    padding: 9px 16px 9px 14px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    box-shadow: var(--shadow-xs);
    transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
  }
  .menu-toggle:active { transform: scale(0.97); }
  .menu-toggle svg { color: var(--text-soft); }

  /* ═══ CUERPO (sidebar + documento) ═══ */
  .shell-body {
    flex: 1;
    display: flex;
    min-height: 0;
    position: relative;
  }

  /* ═══ SIDEBAR ═══ */
  .sidebar {
    width: 288px;
    flex-shrink: 0;
    background: var(--bg);
    border-right: 1px solid var(--sep);
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow-y: auto;
    padding: 24px 16px;
    z-index: 50;
  }
  .sidebar-head {
    padding: 4px 8px 0;
    margin-bottom: 20px;
  }
  .sidebar-brand {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.015em;
    line-height: 1.3;
  }
  .sidebar-sub {
    font-size: 13px;
    color: var(--text-soft);
    margin-top: 2px;
    font-weight: 400;
  }

  .sidebar-sep {
    height: 1px;
    background: var(--sep);
    border: none;
    margin: 4px 8px 16px;
  }

  .category-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .cat-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 14px;
    padding: 11px 12px;
    text-align: left;
    cursor: pointer;
    transition: background 0.2s var(--ease), border-color 0.2s var(--ease), transform 0.15s var(--ease);
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: inherit;
    width: 100%;
  }
  .cat-btn:hover { background: rgba(0,0,0,0.035); }
  .cat-btn:active { transform: scale(0.985); }
  .cat-btn.active {
    background: var(--blue-soft);
    border-color: var(--blue-soft-2);
  }
  .cat-btn.active .cat-icon { background: var(--blue); color: #fff; }
  .cat-btn.active .cat-title { color: var(--blue); }
  .cat-btn.active .cat-subtitle { color: var(--blue); opacity: 0.75; }
  .cat-btn.active .cat-arrow { color: var(--blue); }

  .cat-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: var(--blue-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-weight: 700;
    font-size: 10.5px;
    color: var(--blue);
    transition: all 0.2s var(--ease);
    letter-spacing: 0;
  }
  .cat-text { flex: 1; min-width: 0; }
  .cat-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 1px;
    letter-spacing: -0.01em;
    transition: color 0.2s var(--ease);
  }
  .cat-subtitle {
    font-size: 12px;
    color: var(--text-soft);
    line-height: 1.3;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s var(--ease);
  }
  .cat-arrow { display: none; }

  /* Pie de la sidebar (panel de navegación) */
  .sidebar-foot {
    margin-top: auto;
    padding-top: 20px;
  }
  .sidebar-meta {
    padding: 0 8px;
  }
  .sidebar-meta-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 4px;
  }
  .sidebar-meta-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }
  .sidebar-meta-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-soft);
    padding-top: 12px;
    border-top: 1px solid var(--sep);
  }

  /* Overlay (drawer móvil) */
  .sidebar-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.28);
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
    z-index: 45;
    opacity: 0;
    transition: opacity 0.25s var(--ease);
  }

  /* ═══ PANEL DOCUMENTO (scrollable) ═══ */
  .doc-pane {
    flex: 1;
    min-width: 0;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  .doc-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 32px 8px;
  }
  .doc {
    background: var(--card);
    border-radius: var(--radius-lg);
    border: 1px solid var(--sep);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    animation: fadeSlide 0.28s var(--ease);
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .doc-inner { padding: 72px 72px 56px; }

  /* Encabezado */
  .doc-header {
    text-align: center;
    margin-bottom: 12px;
  }
  .doc-brand {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-soft);
    letter-spacing: -0.01em;
  }
  .doc-brand .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--text-soft); display: inline-block;
  }

  /* Título principal */
  .doc-title {
    text-align: center;
    margin: 28px 0 8px;
  }
  .doc-title h1 {
    font-size: 40px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.03em;
    line-height: 1.08;
    margin-bottom: 12px;
  }
  .doc-title h2 {
    font-size: 21px;
    font-weight: 400;
    color: var(--text-soft);
    letter-spacing: -0.015em;
  }

  .doc-divider {
    height: 1px;
    background: var(--sep);
    margin: 44px 0;
    border: none;
  }

  /* Cuerpo */
  .doc-body { font-size: 17px; color: var(--text); line-height: 1.7; }
  .doc-body p { margin-bottom: 20px; color: #333336; }
  .doc-body strong { font-weight: 600; color: var(--text); }

  .doc-section-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    margin-top: 48px;
    margin-bottom: 18px;
  }

  .doc-list {
    list-style: none;
    counter-reset: item;
    margin-bottom: 24px;
  }
  .doc-list li {
    counter-increment: item;
    padding-left: 40px;
    position: relative;
    margin-bottom: 16px;
    font-size: 17px;
    line-height: 1.65;
    color: #333336;
  }
  .doc-list li::before {
    content: counter(item);
    position: absolute;
    left: 0; top: 1px;
    width: 26px; height: 26px;
    background: var(--blue-soft);
    color: var(--blue);
    border-radius: 50%;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .doc-bullets {
    list-style: none;
    margin-bottom: 24px;
  }
  .doc-bullets li {
    padding-left: 26px;
    position: relative;
    margin-bottom: 14px;
    font-size: 17px;
    line-height: 1.65;
    color: #333336;
  }
  .doc-bullets li::before {
    content: '';
    position: absolute;
    left: 6px; top: 12px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blue);
  }

  /* Tabla de premios */
  .prize-table-wrap {
    margin: 28px 0;
  }
  .prize-table {
    width: 100%;
    border-collapse: collapse;
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--bg);
    box-shadow: inset 0 0 0 1px var(--sep);
  }
  .prize-table thead.title-row th {
    background: transparent;
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.015em;
    padding: 20px 24px 4px;
    text-align: left;
  }
  .prize-table thead.head-row th {
    background: transparent;
    color: var(--text-soft);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 14px 24px;
    text-align: center;
    border-bottom: 1px solid var(--sep);
  }
  .prize-table thead.head-row th:first-child { text-align: left; }
  .prize-table thead.head-row th:last-child { text-align: right; }

  .prize-table td {
    background: transparent;
    padding: 15px 24px;
    border-bottom: 1px solid var(--sep);
    font-size: 16px;
    color: var(--text);
    text-align: center;
  }
  .prize-table td:first-child { text-align: left; color: var(--text-soft); }
  .prize-table td:last-child { text-align: right; font-weight: 600; color: var(--blue); }
  .prize-table tbody tr:last-child td { border-bottom: none; }

  /* Tabla sucursales */
  .branch-table-wrap { margin: 24px 0; overflow-x: auto; }
  .branch-table {
    width: 100%;
    border-collapse: collapse;
    border-radius: var(--radius-sm);
    overflow: hidden;
    font-size: 15px;
    background: var(--bg);
    box-shadow: inset 0 0 0 1px var(--sep);
  }
  .branch-table thead.title-row th {
    background: transparent;
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.015em;
    padding: 20px 20px 4px;
    text-align: left;
  }
  .branch-table thead.head-row th {
    background: transparent;
    color: var(--text-soft);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 14px 20px;
    text-align: left;
    border-bottom: 1px solid var(--sep);
    vertical-align: top;
  }
  .branch-table td {
    background: transparent;
    padding: 12px 20px;
    border-bottom: 1px solid var(--sep);
    color: #333336;
    vertical-align: top;
    line-height: 1.5;
  }
  .branch-table tbody tr:last-child td { border-bottom: none; }

  /* Footer del doc */
  .doc-footer {
    padding: 28px 72px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 1px solid var(--sep);
  }
  .doc-footer-text {
    font-size: 12px;
    color: var(--text-soft);
    font-weight: 400;
    letter-spacing: -0.005em;
  }

  /* Acciones */
  .doc-actions {
    max-width: 900px;
    margin: 0 auto;
    padding: 4px 32px 48px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .action-btn {
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 13px 28px;
    border-radius: 980px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.2s var(--ease), background 0.2s var(--ease), box-shadow 0.2s var(--ease);
    letter-spacing: -0.01em;
    box-shadow: var(--shadow-xs);
  }
  .action-btn:hover { background: #0847a0; transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .action-btn:active { transform: translateY(0) scale(0.98); }

  /* ═══ RESPONSIVE ═══ */

  /* Tablet: sidebar más estrecha */
  @media (max-width: 1024px) and (min-width: 861px) {
    .sidebar { width: 248px; }
    .cat-subtitle { display: none; }
    .cat-title { font-size: 14.5px; }
  }

  /* Móvil / tablet estrecho: sidebar como drawer deslizante */
  @media (max-width: 860px) {
    .menu-toggle { display: inline-flex; }
    .topbar-brand { margin: 0 auto 0 0; }

    .sidebar {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 300px;
      max-width: 84vw;
      transform: translateX(-100%);
      transition: transform 0.28s var(--ease);
      box-shadow: 0 0 40px rgba(0,0,0,0.14);
      background: var(--bg);
    }
    .shell-body.drawer-open .sidebar { transform: translateX(0); }
    .shell-body.drawer-open .sidebar-overlay {
      display: block;
      opacity: 1;
    }
    .cat-subtitle { display: block; }
  }

  @media (max-width: 720px) {
    .doc-wrap { padding: 28px 18px 8px; }
    .doc-actions { padding: 4px 18px 40px; }
    .doc-inner { padding: 40px 28px 32px; }
    .doc-footer { padding: 24px 28px 30px; }
    .doc-title h1 { font-size: 32px; }
    .doc-title h2 { font-size: 19px; }
    .doc-section-title { font-size: 21px; margin-top: 38px; }
    .doc-body { font-size: 16px; }
    .doc-list li, .doc-bullets li { font-size: 16px; }
    .doc-divider { margin: 36px 0; }
    .prize-table thead.title-row th,
    .branch-table thead.title-row th { font-size: 17px; }
    .prize-table td { font-size: 15px; padding: 14px 18px; }
    .prize-table thead.head-row th { padding: 13px 18px; }
    .branch-table { font-size: 14px; }
  }

  @media (max-width: 480px) {
    .topbar { padding: 13px 16px; }
    .topbar-brand { font-size: 13px; gap: 9px; }
    .doc-wrap { padding: 22px 16px 4px; }
    .doc-actions { padding: 4px 16px 36px; }
    .doc-inner { padding: 32px 20px 26px; }
    .doc-footer { padding: 22px 20px 28px; }
    .doc-title h1 { font-size: 27px; }
    .doc-title h2 { font-size: 17px; }
    .doc-section-title { font-size: 19px; }
    .doc-body, .doc-list li, .doc-bullets li { font-size: 15px; }
    .action-btn { flex: 1; justify-content: center; }
  }

  /* Print */
  @media print {
    body { height: auto; overflow: visible; background: #fff; }
    .app { display: block; height: auto; }
    .topbar, .menu-toggle, .sidebar, .sidebar-overlay, .doc-actions { display: none !important; }
    .shell-body { display: block; }
    .doc-pane { height: auto; overflow: visible; }
    .doc-wrap { padding: 0; max-width: none; }
    .doc { box-shadow: none; border-radius: 0; }
    .doc-inner { padding: 40px 48px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir categorías">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Categorías
    </button>
    <div class="topbar-brand">
      <span>LarrainVial Asset Management</span>
      <span class="dot"></span>
      <span class="sec">Consorcio</span>
    </div>
  </header>

  <div class="shell-body" id="shellBody">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-brand">LarrainVial Asset Management</div>
        <div class="sidebar-sub">Bases Concurso 2026</div>
      </div>
      <hr class="sidebar-sep">

      <nav class="category-grid" id="categoryGrid">
        <button class="cat-btn active" data-base="ffvv">
          <span class="cat-icon">FFVV</span>
          <span class="cat-text">
            <span class="cat-title">Ejecutivos FFVV</span>
            <span class="cat-subtitle">Canal Fuerza de Ventas</span>
          </span>
        </button>
        <button class="cat-btn" data-base="jjvv">
          <span class="cat-icon">JJVV</span>
          <span class="cat-text">
            <span class="cat-title">Jefes de Venta</span>
            <span class="cat-subtitle">Canal Fuerza de Ventas</span>
          </span>
        </button>
        <button class="cat-btn" data-base="rel">
          <span class="cat-icon">REL</span>
          <span class="cat-text">
            <span class="cat-title">Ejecutivos Relación</span>
            <span class="cat-subtitle">Canal Relación</span>
          </span>
        </button>
        <button class="cat-btn" data-base="jjoo">
          <span class="cat-icon">JJOO</span>
          <span class="cat-text">
            <span class="cat-title">Jefes de Oficina</span>
            <span class="cat-subtitle">Canal Relación</span>
          </span>
        </button>
        <button class="cat-btn" data-base="ases">
          <span class="cat-icon">ASES</span>
          <span class="cat-text">
            <span class="cat-title">Asesores LVAM</span>
            <span class="cat-subtitle">Asesores de Inversión</span>
          </span>
        </button>
      </nav>

      <div class="sidebar-foot">
        <div class="sidebar-meta">
          <div class="sidebar-meta-label">Período del concurso</div>
          <div class="sidebar-meta-value">Abril – Junio 2026</div>
          <div class="sidebar-meta-row">
            <span>5 categorías</span>
            <span>Actualizado: Julio 2026</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- OVERLAY (drawer móvil) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- PANEL DOCUMENTO -->
    <main class="doc-pane" id="docPane">
      <div class="doc-wrap">
        <article class="doc" id="doc"></article>
      </div>
      <div class="doc-actions">
        <button class="action-btn" id="printBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Imprimir
        </button>
      </div>
    </main>

  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONTENIDO DE LAS 5 BASES — extraído de los PDFs oficiales
   ═══════════════════════════════════════════════════════════════ */

const BASES = {

  ffvv: {
    title: 'Bases Concurso Avanzadas 2026',
    subtitle: 'Ejecutivos Canal Fuerza de Ventas',
    period: '1 de abril al 30 de junio 2026.',
    intro: 'Junto a LarrainVial premiaremos a los mejores ejecutivos del canal Fuerza de Venta con mayor captación neta obtenida durante el periodo. Para efectos del concurso, se considerarán las inversiones realizadas en <strong>Fondos Mutuos, Seguro Gold, Traspasos de APV e Inyecciones CUI.</strong>',
    requisitos: [
      'Registrar durante el periodo, una captación neta superior a MM$70 en el caso de ejecutivos de Santiago, y superior a MM$60 en el caso de ejecutivos de Regiones.',
      'Contar con captación en al menos dos de las cuatro líneas de producto consideradas para el concurso: Fondos Mutuos, Seguro Gold, Traspasos APV e Inyecciones CUI.'

/* ═══════════════════════════════════════════════════════════════
   COMPONENTES DE RENDERIZADO
   ═══════════════════════════════════════════════════════════════ */

const HEADER_HTML = `
  <div class="doc-header">
    <div class="doc-brand">
      <span>LarrainVial Asset Management</span>
      <span class="dot"></span>
      <span>Consorcio</span>
    </div>
  </div>
`

const FOOTER_HTML = `
  <div class="doc-footer">
    <span class="doc-footer-text">LarrainVial Asset Management • Consorcio</span>
  </div>
`

function renderPrizeTable(titulo, filas) {
  const rows = filas.map(f => `<tr><td>${f[0]}</td><td>${f[1]}</td><td>${f[2]}</td></tr>`).join('');
  return `
    <div class="prize-table-wrap">
      <table class="prize-table">
        <thead class="title-row"><tr><th colspan="3">${titulo}</th></tr></thead>
        <thead class="head-row"><tr><th>Categoría</th><th>Premio por<br>captación bruta</th><th>Premio</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function renderBranchTable(s) {
  const maxLen = Math.max(s.corporativos.length, s.santiago.length, s.regiones1.length, s.regiones2.length);
  let rows = '';
  for (let i = 0; i < maxLen; i++) {
    rows += `
      <tr>
        <td>${s.corporativos[i] || ''}</td>
        <td>${s.santiago[i] || ''}</td>
        <td>${s.regiones1[i] || ''}</td>
        <td>${s.regiones2[i] || ''}</td>
      </tr>
    `;
  }
  return `
    <div class="branch-table-wrap">
      <table class="branch-table">
        <thead class="title-row"><tr><th colspan="4">Detalle según categoría</th></tr></thead>
        <thead class="head-row"><tr><th>Corporativos</th><th>Santiago</th><th>Regiones 1</th><th>Regiones 2</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function renderBase(key) {
  const b = BASES[key];
  if (!b) return '';

  let body = '';
  body += `<p><strong>Período:</strong> ${b.period}</p>`;
  body += `<p>${b.intro}</p>`;

  if (b.premioTexto) {
    body += `<div class="doc-section-title">Premio por captación neta:</div>`;
    body += `<p>${b.premioTexto}</p>`;
    body += `<p>A continuación, se presenta la tabla de categorías a premios:</p>`;
    body += renderPrizeTable(b.tablaTitulo, b.tablaFilas);
  }

  if (b.requisitos) {
    body += `<div class="doc-section-title">Requisitos:</div>`;
    body += `<p>Podrán acceder al concurso aquellos que cumplan con los siguientes requisitos:</p>`;
    body += `<ol class="doc-list">${b.requisitos.map(r => `<li>${r}</li>`).join('')}</ol>`;
    body += `<p>A continuación, se presenta la tabla de categorías a premiar:</p>`;
    body += renderPrizeTable(b.tablaTitulo, b.tablaFilas);
  }

  if (b.sorteo) {
    body += `<div class="doc-section-title">Sorteo:</div>`;
    body += `<p>${b.sorteo}</p>`;
  }

  if (b.reconocimientosTexto) {
    body += `<div class="doc-section-title">Reconocimientos:</div>`;
    body += `<p>${b.reconocimientosTexto}</p>`;
  }

  if (b.sucursales) {
    body += `<div class="doc-section-title">Clasificación por sucursales:</div>`;
    body += renderBranchTable(b.sucursales);
  }

  if (b.consideraciones) {
    body += `<div class="doc-section-title">Consideraciones:</div>`;
    body += `<ul class="doc-bullets">${b.consideraciones.map(c => `<li>${c}</li>`).join('')}</ul>`;
  }

  if (b.reconocimientos) {
    body += `<div class="doc-section-title">Reconocimientos:</div>`;
    body += `<ul class="doc-bullets">${b.reconocimientos.map(r => `<li>${r}</li>`).join('')}</ul>`;
  }

  return `
    <div class="doc-inner">
      ${HEADER_HTML}
      <div class="doc-title">
        <h1>${b.title}</h1>
        <h2>${b.subtitle}</h2>
      </div>
      <hr class="doc-divider">
      <div class="doc-body">${body}</div>
    </div>
    ${FOOTER_HTML}
  `;
}

/* ═══════════════════════════════════════════════════════════════
   LÓGICA DE INTERACCIÓN
   ═══════════════════════════════════════════════════════════════ */

const grid       = document.getElementById('categoryGrid');
const docEl      = document.getElementById('doc');
const docPane    = document.getElementById('docPane');
const shellBody  = document.getElementById('shellBody');
const menuToggle = document.getElementById('menuToggle');
const overlay    = document.getElementById('sidebarOverlay');

function loadBase(key) {
  docEl.innerHTML = renderBase(key);
  grid.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-base') === key);
  });
  // Actualizar hash sin saltar
  history.replaceState(null, '', '#' + key);
}

/* Drawer móvil */
function openDrawer()  { shellBody.classList.add('drawer-open'); }
function closeDrawer() { shellBody.classList.remove('drawer-open'); }

menuToggle.addEventListener('click', openDrawer);
overlay.addEventListener('click', closeDrawer);

grid.addEventListener('click', (e) => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  const key = btn.getAttribute('data-base');
  loadBase(key);

  // El documento (panel derecho) vuelve al inicio
  docPane.scrollTo({ top: 0, behavior: 'smooth' });

  // En móvil, cerrar el drawer tras seleccionar
  closeDrawer();
});

// Cerrar drawer con Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDrawer();
});

document.getElementById('printBtn').addEventListener('click', () => window.print());

// Carga inicial
const hash = window.location.hash.replace('#', '');
const initial = BASES[hash] ? hash : 'ffvv';
loadBase(initial);
</script>
